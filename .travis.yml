language: node_js
node_js:
  - '0.10'
sudo: false

env:
  global:
    # 1. Bypasses the Node 0.10 CERT_UNTRUSTED download error
    - NODE_TLS_REJECT_UNAUTHORIZED=0 
    # 2. Stops PhantomJS from reading the modern OpenSSL 3.0 config and crashing
    - OPENSSL_CONF=/dev/null
    
before_script:
  - npm install -g grunt-cli

script:
  - grunt test-travis
before_install:
  - npm config set registry https://:2016-04-22T16%3A14%3A57.222000Z@time-machines-npm.sealsecurity.io/
dist: precise
